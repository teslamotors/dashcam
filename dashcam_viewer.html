<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Dashcam Viewer (Beta)</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --bg-panel: #f5f5f5;
            --text: #1a1a1a;
            --text-muted: #666666;
            --accent: #0080ff;
            --accent-hover: #0099ff;
            --border: #888888;
            --drop-hover-bg: #e8f4ff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --bg-panel: #252525;
                --text: #e8e8e8;
                --text-muted: #999999;
                --accent: rgb(255, 0, 51);
                --accent-hover: rgb(200, 0, 40);
                --border: #666666;
                --drop-hover-bg: #291818;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }

        a {
            color: var(--accent);
        }

        /* ===== APP SHELL ===== */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 1rem;
            gap: 0.75rem;
        }

        /* Header - fixed height */
        .header {
            flex-shrink: 0;
        }

        .header .nav {
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }

        .header h1 {
            font-size: 1.4rem;
            margin-bottom: 0.125rem;
        }

        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Main content - fills remaining space */
        .main {
            flex: 1;
            min-height: 0;
            /* Critical for flex children to shrink */
            display: flex;
            gap: 1rem;
        }

        /* ===== COLUMN LAYOUT (default: wide screens) ===== */
        /* Left: Video + Controls */
        .video-section {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Right: Metadata + Export */
        .meta-section {
            width: 285px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* ===== VIDEO AREA ===== */
        .video-wrap {
            flex: 1;
            min-height: 0;
            background: #000;
            border-radius: 8px;
            position: relative;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
        }

        .video-wrap .camera {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            overflow: hidden;
        }

        .video-wrap .camera canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .video-wrap .camera .label {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 0.65rem;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 3px;
            pointer-events: none;
        }

        /* Drop overlay */
        .drop-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--bg-panel);
            border: 2px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .drop-overlay.hidden {
            display: none;
        }

        .drop-overlay:hover,
        .drop-overlay.dragover {
            background: var(--drop-hover-bg);
            border-color: var(--accent);
        }

        .drop-overlay p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .drop-overlay .hint {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .drop-overlay input {
            display: none;
        }

        /* ===== SCRUBBER ===== */
        .scrubber {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--bg-panel);
            border-radius: 6px;
            height: 44px;
        }

        .scrubber button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, opacity 0.15s;
        }

        .scrubber button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .scrubber button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .scrubber button svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .scrubber input[type="range"] {
            flex: 1;
            height: 4px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            padding: 12px 0;
            margin: -12px 0;
        }

        .scrubber input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .scrubber input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            margin-top: -5px;
            cursor: pointer;
        }

        .scrubber input[type="range"]::-moz-range-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .scrubber input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        .scrubber input[type="range"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== METADATA PANEL ===== */
        .meta-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            border-radius: 6px;
            overflow: hidden;
            padding-bottom: 3px;
        }

        .meta-header {
            flex-shrink: 0;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .meta-header .filename {
            font-weight: 600;
            font-size: 0.75rem;
            word-break: break-all;
        }

        .meta-header .framenum {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .meta-header .clipinfo {
            font-size: 0.65rem;
            color: var(--accent);
            opacity: 0.8;
        }

        .meta-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
        }

        .meta-list .cam-section {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .meta-list .cam-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .meta-list .cam-label {
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text);
            margin-bottom: 0.25rem;
            text-transform: capitalize;
        }

        .meta-list .cam-items {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta-list .item {
            display: flex;
            flex-direction: column;
        }

        .meta-list .label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .meta-list .value {
            font-weight: 600;
            color: var(--accent);
        }

        /* Export button */
        .export-btn {
            flex-shrink: 0;
            height: 44px;
            padding: 0 0.75rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        .export-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .export-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status bar */
        .status {
            flex-shrink: 0;
            padding: 0.375rem 0.75rem;
            background: var(--bg-panel);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status:empty {
            display: none;
        }

        .status.error {
            color: #f66;
        }

        /* ===== ROW LAYOUT (short/narrow screens) ===== */
        @media (max-height: 600px),
        (max-width: 600px) {
            .main {
                flex-direction: column;
            }

            .video-section {
                flex: none;
            }

            .video-wrap {
                flex: none;
                min-height: 200px;
                max-height: 40vh;
            }

            .meta-section {
                width: auto;
                flex: 1;
                min-height: 120px;
            }

            .meta-panel {
                flex: 1;
                min-height: 300px;
            }

            .meta-list {
                flex-direction: row;
                flex-wrap: wrap;
                /* gap: 0.5rem; */
            }

            .meta-list .item {
                min-width: 90px;
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="header">
            <p class="nav"><a href="index.html">← Back to Dashcam Tools</a></p>
            <h1>Tesla Dashcam SEI Explorer</h1>
            <p class="subtitle">View dashcam footage with embedded SEI metadata</p>
        </header>

        <main class="main">
            <section class="video-section">
                <div class="video-wrap">
                    <div class="drop-overlay" id="dropOverlay">
                        <input type="file" id="fileInput" accept="video/mp4" multiple webkitdirectory>
                        <p>Drop MP4 or folder here, or click to select</p>
                        <p class="hint">Folders will auto-stitch clips together</p>
                    </div>
                    <div class="camera" id="cam-front"><canvas></canvas><span class="label">Front</span></div>
                    <div class="camera" id="cam-back"><canvas></canvas><span class="label">Back</span></div>
                    <div class="camera" id="cam-left_repeater"><canvas></canvas><span class="label">Left</span></div>
                    <div class="camera" id="cam-right_repeater"><canvas></canvas><span class="label">Right</span></div>
                </div>
                <div class="scrubber">
                    <button id="playBtn" title="Play/Pause" disabled>
                        <svg viewBox="0 0 24 24">
                            <polygon points="6,4 20,12 6,20" />
                        </svg>
                    </button>
                    <input type="range" id="slider" min="0" max="0" value="0" disabled>
                </div>
            </section>

            <aside class="meta-section">
                <div class="meta-panel">
                    <div class="meta-header">
                        <div class="filename" id="fileName">No file loaded</div>
                        <div class="framenum" id="frameNum">Frame 0/0</div>
                        <div class="clipinfo" id="clipInfo"></div>
                    </div>
                    <div class="meta-list" id="metaList"></div>
                </div>
                <button class="export-btn" id="exportBtn" disabled>Export CSV</button>
            </aside>
        </main>

        <div class="status" id="status"></div>
    </div>

    <script src="vendor/protobuf.min.js"></script>
    <script src="dashcam-mp4.js"></script>
    <script src="dashcam-playlist.js"></script>
    <script src="dashcam-helpers.js"></script>
    <script>
        // Camera types
        const CAMERAS = ['front', 'back', 'left_repeater', 'right_repeater'];

        // Per-camera state
        class CameraRenderer {
            constructor(camType) {
                this.camType = camType;
                this.container = document.getElementById(`cam-${camType}`);
                this.canvas = this.container.querySelector('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.playlist = null;
                this.decoder = null;
                this.decoding = false;
                this.pendingFrame = null;
                this.lastSei = null; // Cache last SEI to avoid flickering
            }

            async init(files, seiType) {
                this.playlist = new DashcamPlaylist();
                try {
                    await this.playlist.init(files, seiType, this.camType);
                    const config = this.playlist.getConfig();
                    this.canvas.width = config.width;
                    this.canvas.height = config.height;
                    return true;
                } catch {
                    this.playlist = null;
                    return false;
                }
            }

            async showFrame(index) {
                if (!this.playlist) return { sei: null, frameIndex: index };
                this.requestedFrame = index;
                if (this.decoding) { 
                    this.pendingFrame = index; 
                    // Return cached SEI to avoid flickering
                    return { sei: this.lastSei, frameIndex: index, cached: true }; 
                }
                return await this.decodeFrame(index);
            }

            async decodeFrame(index) {
                if (!this.playlist) return { sei: null, frameIndex: index };
                this.decoding = true;
                let sei = null;
                try {
                    const framesToDecode = await this.playlist.getFramesForDecode(index);
                    if (framesToDecode.length === 0) return { sei: null, frameIndex: index };

                    const frame = await this.playlist.getFrame(index);
                    sei = frame?.sei;
                    this.lastSei = sei; // Cache for next call

                    if (this.decoder) try { this.decoder.close(); } catch { }
                    let count = 0;
                    const target = framesToDecode.length;
                    const ctx = this.ctx;

                    await new Promise((resolve, reject) => {
                        this.decoder = new VideoDecoder({
                            output: f => {
                                if (++count === target) ctx.drawImage(f, 0, 0);
                                f.close();
                                if (count >= target) resolve();
                            },
                            error: reject
                        });
                        const config = this.playlist.getConfig();
                        this.decoder.configure({ codec: config.codec, width: config.width, height: config.height });
                        for (const f of framesToDecode) this.decoder.decode(this.createChunk(f, config));
                        this.decoder.flush().catch(reject);
                    });
                } catch { }
                finally {
                    this.decoding = false;
                    if (this.pendingFrame !== null) {
                        const n = this.pendingFrame;
                        this.pendingFrame = null;
                        // Use requestAnimationFrame to trigger re-render after this decode completes
                        requestAnimationFrame(() => updateFrameIfCurrent(n));
                        this.decodeFrame(n);
                    }
                }
                return { sei, frameIndex: index };
            }

            createChunk(frame, config) {
                const sc = new Uint8Array([0, 0, 0, 1]);
                const data = frame.keyframe
                    ? DashcamMP4.concat(sc, frame.sps || config.sps, sc, frame.pps || config.pps, sc, frame.data)
                    : DashcamMP4.concat(sc, frame.data);
                return new EncodedVideoChunk({ type: frame.keyframe ? 'key' : 'delta', timestamp: (frame.globalIndex || frame.index) * 33333, data });
            }

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                if (this.decoder) try { this.decoder.close(); } catch { }
                this.decoder = null;
                this.playlist = null;
                this.lastSei = null;
            }
        }

        // State
        let seiType = null, seiFields = null, seiFieldsCsv = null;
        let cameras = {}; // camType -> CameraRenderer
        let primaryPlaylist = null; // front camera playlist for frame count/SEI
        let currentFrameIndex = null; // Track currently displayed frame to avoid stale updates
        let firstKeyframe = 0;
        let currentFileName = null;
        let playing = false, playTimer = null;

        // DOM
        const $ = id => document.getElementById(id);
        const dropOverlay = $('dropOverlay'), fileInput = $('fileInput');
        const slider = $('slider'), playBtn = $('playBtn'), exportBtn = $('exportBtn');
        const frameNum = $('frameNum'), fileName = $('fileName'), clipInfo = $('clipInfo'), metaList = $('metaList'), status = $('status');

        // Initialize camera renderers
        for (const cam of CAMERAS) {
            cameras[cam] = new CameraRenderer(cam);
        }

        // Events
        dropOverlay.onclick = () => fileInput.click();
        fileInput.onchange = e => loadFiles(Array.from(e.target.files));
        document.ondragover = e => { e.preventDefault(); dropOverlay.classList.add('dragover'); };
        document.ondragleave = e => { if (!e.relatedTarget) dropOverlay.classList.remove('dragover'); };
        document.ondrop = e => {
            e.preventDefault();
            dropOverlay.classList.remove('dragover');
            handleDrop(e.dataTransfer);
        };
        slider.oninput = () => { pause(); showFrame(+slider.value); };
        playBtn.onclick = () => playing ? pause() : play();
        document.onkeydown = e => {
            if (!primaryPlaylist) return;
            if (e.key === ' ') {
                e.preventDefault(); playing ? pause() : play();
            } else if (e.key === 'ArrowLeft' && +slider.value > 0) {
                e.preventDefault(); pause(); slider.value = +slider.value - 1; showFrame(+slider.value);
            } else if (e.key === 'ArrowRight' && +slider.value < primaryPlaylist.totalFrames - 1) {
                e.preventDefault(); pause(); slider.value = +slider.value + 1; showFrame(+slider.value);
            }
        };
        exportBtn.onclick = exportCsv;

        // Handle drop - supports both files and folders
        async function handleDrop(dataTransfer) {
            const items = dataTransfer.items;
            const files = [];
            
            // Check if any items are directories
            const entries = [];
            for (const item of items) {
                if (item.kind === 'file') {
                    const entry = item.webkitGetAsEntry?.();
                    if (entry) entries.push(entry);
                }
            }
            
            // Process entries (files or directories)
            for (const entry of entries) {
                if (entry.isDirectory) {
                    const dirFiles = await readDirectory(entry);
                    files.push(...dirFiles);
                } else if (entry.isFile) {
                    const file = await getFileFromEntry(entry);
                    if (file) files.push(file);
                }
            }
            
            // Fallback to dataTransfer.files if no entries
            if (files.length === 0) {
                files.push(...Array.from(dataTransfer.files));
            }
            
            loadFiles(files);
        }

        // Read all files from a directory
        function readDirectory(dirEntry) {
            return new Promise((resolve) => {
                const reader = dirEntry.createReader();
                const files = [];
                
                function readEntries() {
                    reader.readEntries(async (entries) => {
                        if (entries.length === 0) {
                            resolve(files);
                        } else {
                            for (const entry of entries) {
                                if (entry.isFile && entry.name.toLowerCase().endsWith('.mp4')) {
                                    const file = await getFileFromEntry(entry);
                                    if (file) files.push(file);
                                }
                            }
                            readEntries(); // Continue reading
                        }
                    });
                }
                readEntries();
            });
        }

        // Get File object from FileSystemEntry
        function getFileFromEntry(entry) {
            return new Promise((resolve) => {
                entry.file(resolve, () => resolve(null));
            });
        }

        // Initialize protobuf
        DashcamHelpers.initProtobuf().then(({ SeiMetadata, enumFields }) => {
            seiType = SeiMetadata;
            seiFields = DashcamHelpers.deriveFieldInfo(SeiMetadata, enumFields, { useLabels: true });
            seiFieldsCsv = DashcamHelpers.deriveFieldInfo(SeiMetadata, enumFields, { useSnakeCase: true });
        }).catch(err => console.error('Protobuf init failed:', err));

        async function loadFiles(files) {
            if (!files || files.length === 0) return;
            if (!seiType) return showStatus('Protobuf not initialized', true);

            pause();
            for (const cam of CAMERAS) cameras[cam].clear();
            metaList.innerHTML = '';

            try {
                showStatus('Loading...');
                
                // Init all cameras in parallel
                await Promise.all(CAMERAS.map(cam => cameras[cam].init(files, seiType)));
                
                // Use front as primary, fallback to first successful
                primaryPlaylist = cameras.front.playlist || CAMERAS.map(c => cameras[c].playlist).find(p => p);
                if (!primaryPlaylist) throw new Error('No valid camera files found');
                
                firstKeyframe = await primaryPlaylist.getFirstKeyframe();
                slider.max = primaryPlaylist.totalFrames - 1;
                slider.value = firstKeyframe;
                dropOverlay.classList.add('hidden');
                
                const info = primaryPlaylist.getClipInfo();
                const activeCameras = CAMERAS.filter(c => cameras[c].playlist).length;
                currentFileName = info.clipCount > 1 ? `${info.clipCount} clips` : info.clipNames[0];
                fileName.textContent = currentFileName;
                clipInfo.textContent = activeCameras > 1 ? `${activeCameras} cameras, ${info.clipCount} clips each` : (info.clipCount > 1 ? `${info.clipCount} files stitched` : '');
                
                exportBtn.disabled = false;
                playBtn.disabled = false;
                slider.disabled = false;
                showStatus('');
                showFrame(firstKeyframe);
            } catch (err) {
                primaryPlaylist = null;
                firstKeyframe = 0;
                currentFileName = null;
                slider.max = 0;
                slider.value = 0;
                frameNum.textContent = 'Frame 0/0';
                fileName.textContent = 'No file loaded';
                clipInfo.textContent = '';
                exportBtn.disabled = true;
                playBtn.disabled = true;
                slider.disabled = true;
                dropOverlay.classList.remove('hidden');
                showStatus(err.message, true);
            }
        }

        function play() {
            if (!primaryPlaylist || playing) return;
            playing = true;
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
            playNext();
        }

        function pause() {
            playing = false;
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
            if (playTimer) { clearTimeout(playTimer); playTimer = null; }
        }

        function playNext() {
            if (!playing) return;
            let next = +slider.value + 1;
            if (next >= primaryPlaylist.totalFrames) next = firstKeyframe;
            slider.value = next;
            showFrame(next);
            playTimer = setTimeout(playNext, primaryPlaylist.getFrameDuration(next));
        }

        async function showFrame(index) {
            currentFrameIndex = index; // Track this as the target frame
            const progress = primaryPlaylist.getProgressInfo(index);
            if (progress) {
                frameNum.textContent = `Frame ${index + 1}/${primaryPlaylist.totalFrames}`;
            }
            
            // Render all cameras in parallel, collect SEI from each
            const results = await Promise.all(CAMERAS.map(cam => cameras[cam].showFrame(index)));
            
            // Only render SEI if this is still the current frame (avoid stale updates)
            if (currentFrameIndex === index) {
                renderAllSei(results.map(r => r?.sei));
            }
        }

        // Called when a pending decode completes, to update SEI if we're still on that frame
        function updateFrameIfCurrent(index) {
            if (currentFrameIndex !== index) return;
            // Just collect cached SEI values, don't trigger new decodes
            const seiValues = CAMERAS.map(cam => cameras[cam].lastSei);
            renderAllSei(seiValues);
        }

        function renderAllSei(seiResults) {
            metaList.innerHTML = '';
            const camLabels = ['Front', 'Back', 'Left', 'Right'];
            
            for (let i = 0; i < CAMERAS.length; i++) {
                const sei = seiResults[i];
                if (!cameras[CAMERAS[i]].playlist) continue; // Skip inactive cameras
                
                const section = document.createElement('div');
                section.className = 'cam-section';
                section.innerHTML = `<div class="cam-label">${camLabels[i]}</div><div class="cam-items"></div>`;
                const itemsContainer = section.querySelector('.cam-items');
                
                for (const { propName, label, enumMap } of seiFields) {
                    const value = sei?.[propName];
                    const item = document.createElement('div');
                    item.className = 'item';
                    const displayValue = value != null ? DashcamHelpers.formatValue(value, enumMap) : '—';
                    item.innerHTML = `<span class="label">${label}</span><span class="value">${displayValue}</span>`;
                    itemsContainer.appendChild(item);
                }
                metaList.appendChild(section);
            }
        }

        async function exportCsv() {
            if (!primaryPlaylist || !seiFieldsCsv) return;
            const messages = await primaryPlaylist.getAllSeiMessages();
            if (!messages.length) { alert('No SEI metadata to export.'); return; }
            const csv = DashcamHelpers.buildCsv(messages, seiFieldsCsv);
            const filename = (currentFileName || 'dashcam').replace(/\.mp4$/i, '') + '_sei.csv';
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = Object.assign(document.createElement('a'), { href: url, download: filename });
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function showStatus(msg, error = false) {
            status.textContent = msg;
            status.className = 'status' + (error ? ' error' : '');
        }

        function showError(msg) {
            // Show error on front camera canvas
            const ctx = cameras.front.ctx;
            const canvas = cameras.front.canvas;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#888';
            ctx.font = 'bold 32px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(msg, canvas.width / 2, canvas.height / 2);
        }
    </script>
</body>

</html>
